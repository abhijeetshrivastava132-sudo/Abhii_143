<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Like Me? 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #fdf6f0 0%, #ffe5ec 100%);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.7);
    z-index: 1000;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    background: linear-gradient(135deg, #ff4d6d, #ff85a2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: slideInLeft 0.8s ease-out;
}

.credit-box {
    background: linear-gradient(135deg, #ff85a2, #ff4d6d);
    padding: 12px 24px;
    border-radius: 50px;
    cursor: pointer;
    color: white;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
    border: none;
}

.credit-box:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(255, 77, 109, 0.5);
}

.credit-box:active {
    transform: translateY(-1px);
}

/* ANIMATIONS */
@keyframes slideInLeft {
    from {
        opacity: 0;
        transform: translateX(-50px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
}

@keyframes glow {
    0%, 100% { box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3); }
    50% { box-shadow: 0 8px 30px rgba(255, 77, 109, 0.6); }
}

@keyframes confetti-fall {
    0% {
        transform: translateY(-100vh) rotateZ(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotateZ(720deg);
        opacity: 0;
    }
}

@keyframes heartFloat {
    0% {
        transform: translateY(0) translateX(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh) translateX(100px);
        opacity: 0;
    }
}

/* MAIN PAGE */
.main {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 180px 20px 20px;
}

.container {
    text-align: center;
    animation: fadeInUp 1s ease-out;
}

.container h1 {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    background: linear-gradient(135deg, #ff4d6d, #ff85a2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
    font-weight: 700;
    line-height: 1.4;
}

.container p {
    font-size: 18px;
    color: #666;
    margin-bottom: 40px;
    font-weight: 300;
}

/* BUTTONS */
.buttons {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    margin-top: 40px;
}

button {
    padding: 15px 40px;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Poppins', sans-serif;
    position: relative;
    overflow: hidden;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.3);
    transition: left 0.3s ease;
}

button:hover::before {
    left: 100%;
}

#yes {
    background: linear-gradient(135deg, #ff85a2, #ff4d6d);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
    animation: glow 2s ease-in-out infinite;
}

#yes:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 30px rgba(255, 77, 109, 0.5);
}

#yes:active {
    transform: translateY(-2px);
}

#no {
    background: linear-gradient(135deg, #cce5ff, #99d4ff);
    color: #333;
    box-shadow: 0 4px 15px rgba(153, 212, 255, 0.3);
}

#no:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 30px rgba(153, 212, 255, 0.5);
}

#no:active {
    transform: translateY(-2px);
}

/* CREDIT PAGE */
.credit-page {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
    animation: fadeInUp 0.8s ease-out;
}

.credit-page h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    background: linear-gradient(135deg, #ff4d6d, #ff85a2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 40px;
    font-weight: 700;
}

.icons {
    margin: 40px 0;
    font-size: 48px;
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
}

.icons a {
    color: #ff4d6d;
    transition: all 0.3s ease;
    display: inline-block;
}

.icons a:hover {
    transform: scale(1.2) rotate(10deg);
    color: #ff85a2;
}

.back-btn {
    margin-top: 40px;
    padding: 12px 32px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff85a2, #ff4d6d);
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
    transition: all 0.3s ease;
}

.back-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(255, 77, 109, 0.5);
}

.back-btn:active {
    transform: translateY(-1px);
}

/* SUCCESS PAGE */
.success-page {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-family: 'Poppins', sans-serif;
    color: #ff4d6d;
    flex-direction: column;
    background: linear-gradient(135deg, #fdf6f0 0%, #ffe5ec 100%);
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 999;
    animation: fadeInUp 0.8s ease-out;
}

.success-content {
    text-align: center;
    margin-bottom: 40px;
}

.success-page h1 {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    margin-bottom: 30px;
    animation: fadeInUp 0.8s ease-out;
}

.success-page p {
    font-size: 20px;
    animation: fadeInUp 1s ease-out;
    color: #666;
    margin-bottom: 50px;
}

.success-back-btn {
    margin-top: 20px;
    padding: 12px 32px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff85a2, #ff4d6d);
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
    transition: all 0.3s ease;
}

.success-back-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(255, 77, 109, 0.5);
}

.success-back-btn:active {
    transform: translateY(-1px);
}

/* HEARTS */
.heart {
    position: fixed;
    font-size: 24px;
    animation: heartFloat 4s ease-in forwards;
    pointer-events: none;
    z-index: 500;
}

/* CONFETTI */
.confetti {
    position: fixed;
    pointer-events: none;
    z-index: 490;
    font-size: 20px;
    animation: confetti-fall 3s ease-in forwards;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .navbar {
        padding: 15px 20px;
    }

    .logo {
        font-size: 22px;
    }

    .credit-box {
        font-size: 12px;
        padding: 10px 20px;
    }

    .main {
        padding: 140px 20px 20px;
    }

    .container h1 {
        font-size: 36px;
    }

    .container p {
        font-size: 16px;
    }

    .buttons {
        gap: 20px;
    }

    button {
        padding: 12px 30px;
        font-size: 16px;
    }

    .credit-page h1 {
        font-size: 32px;
    }

    .icons {
        font-size: 36px;
        gap: 20px;
    }

    .success-page h1 {
        font-size: 40px;
    }

    .success-page p {
        font-size: 16px;
    }
}

@media (max-width: 480px) {
    .navbar {
        padding: 12px 15px;
    }

    .logo {
        font-size: 18px;
    }

    .main {
        padding: 120px 15px 20px;
    }

    .container h1 {
        font-size: 28px;
    }

    .container p {
        font-size: 14px;
    }

    button {
        padding: 10px 25px;
        font-size: 14px;
    }

    .credit-page h1 {
        font-size: 24px;
    }

    .icons {
        font-size: 28px;
    }

    .success-page h1 {
        font-size: 32px;
    }

    .success-page p {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">💗 Abhii</div>
    <div class="credit-box" onclick="showCredit()">Credit</div>
</div>

<!-- MAIN PAGE -->
<div class="main" id="mainPage">
    <div class="container">
        <h1>Do you like me? 👀</h1>
        <p>Be honest.</p>

        <div class="buttons">
            <button id="yes">Yess 💗</button>
            <button id="no">Nope 😔</button>
        </div>
    </div>
</div>

<!-- CREDIT PAGE -->
<div class="credit-page" id="creditPage">
    <h1>Made by Abhii 💗</h1>
    <p>With love & code ✨</p>

    <div class="icons">
        <a href="https://instagram.com/ft.abh1i" target="_blank" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://snapchat.com/add/x.idfc" target="_blank" title="Snapchat">
            <i class="fab fa-snapchat"></i>
        </a>
    </div>

    <button class="back-btn" onclick="goBack()">← Back</button>
</div>

<!-- SUCCESS PAGE -->
<div class="success-page" id="successPage">
    <div class="success-content">
        <h1>I knew it! 🥹</h1>
        <p>I like you too! 💗✨</p>
        <button class="success-back-btn" onclick="goToHome()">← Home</button>
    </div>
</div>

<script>
// Audio context for sound effects
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

// Sound effects
function playSound(frequency, duration) {
    try {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        
        oscillator.frequency.value = frequency;
        oscillator.type = 'sine';
        
        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + duration);
    } catch (e) {
        console.log('Audio not available');
    }
}

function playSuccessSound() {
    playSound(523.25, 0.2); // C5
    setTimeout(() => playSound(659.25, 0.2), 200); // E5
    setTimeout(() => playSound(783.99, 0.4), 400); // G5
}

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

// Navigation
function showCredit() {
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("creditPage").style.display = "flex";
}

function goBack() {
    document.getElementById("creditPage").style.display = "none";
    document.getElementById("mainPage").style.display = "flex";
}

function goToHome() {
    document.getElementById("successPage").style.display = "none";
    document.getElementById("mainPage").style.display = "flex";
    
    // Clear hearts and confetti from DOM
    document.querySelectorAll('.heart, .confetti').forEach(el => el.remove());
}

// Move NO button
function moveNoButton() {
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const maxX = window.innerWidth - btnWidth - 20;
    const maxY = window.innerHeight - btnHeight - 100;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY + 100;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
    
    playSound(400, 0.1);
}

noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNoButton();
});

// Confetti creation
function createConfetti() {
    const confettiPieces = ['🎉', '✨', '💗', '🎊', '⭐', '🌟'];
    
    for (let i = 0; i < 50; i++) {
        setTimeout(() => {
            let confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.textContent = confettiPieces[Math.floor(Math.random() * confettiPieces.length)];
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.top = "-50px";
            confetti.style.fontSize = Math.random() * 20 + 20 + "px";
            confetti.style.opacity = Math.random() * 0.5 + 0.5;
            document.body.appendChild(confetti);
            
            setTimeout(() => confetti.remove(), 3000);
        }, i * 30);
    }
}

// Heart animation
function createHearts() {
    let heartInterval = setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💗";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }, 300);
    
    // Store interval ID for later clearing
    document.heartInterval = heartInterval;
}

// YES click
yesBtn.addEventListener("click", () => {
    playSuccessSound();
    createConfetti();

    document.getElementById("mainPage").style.display = "none";
    document.getElementById("successPage").style.display = "flex";
    
    createHearts();
});
</script>

</body>
</html>
